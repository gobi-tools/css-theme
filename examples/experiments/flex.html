<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Layouts</title>
  <!--
   bg -> faint
   fg -> muted
   dk -> ???
   sk -> inked 
   -->

  <style>
    :root,
    :root[data-theme='light'] {
      --color-border: color-mix(in srgb, var(--color-txt) 14%, transparent);
      --color-txt-fg: color-mix(in srgb, var(--color-txt) 50%, transparent);

      --color-accent-bg: color-mix(in srgb, var(--color-txt) 8%, transparent);
      --color-accent-fg: color-mix(in srgb, var(--color-txt) 14%, transparent);
      --color-accent-dk: color-mix(in oklch, var(--color-txt) 75%, white);

      --color-primary-bg: color-mix(in srgb, var(--color-primary) 8%, transparent);
      --color-primary-dk: color-mix(in oklch, var(--color-primary) 65%, black);
      --color-primary-sk: color-mix(in oklch, var(--color-primary) 85%, black);

      --color-secondary-bg: color-mix(in oklch, var(--color-secondary) 30%, white);
      --color-secondary-fg: color-mix(in oklch, var(--color-secondary) 60%, white);
    }

    :root[data-theme='dark'] {
      --color-accent-dk: color-mix(in oklch, var(--color-txt) 50%, black);

      --color-primary-dk: color-mix(in oklch, var(--color-primary) 25%, white);
      --color-primary-sk: color-mix(in oklch, var(--color-primary) 35%, white);

      --color-secondary-bg: color-mix(in oklch, var(--color-secondary) 90%, black);
      --color-secondary-fg: color-mix(in oklch, var(--color-secondary) 70%, white);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-accent-dk: color-mix(in oklch, var(--color-txt) 50%, black);

        --color-primary-dk: color-mix(in oklch, var(--color-primary) 25%, white);
        --color-primary-sk: color-mix(in oklch, var(--color-primary) 35%, white);

        --color-secondary-bg: color-mix(in oklch, var(--color-secondary) 90%, black);
        --color-secondary-fg: color-mix(in oklch, var(--color-secondary) 70%, white);
      }
    }

    /** COLORS **/

    * {
      color: var(--color-txt);
    }

    body {
      background: var(--color-bg);
    }

    blockquote {
      background: var(--color-accent-bg);
      border-left: 5px solid var(--color-accent-dk);
    }

    mark {
      background: var(--color-accent-fg);
    }

    pre>code {
      background: var(--color-accent-bg);
      border-left: 5px solid var(--color-secondary);
    }

    button {
      border: 2px solid var(--color-primary);
      background: var(--color-primary);
      color: var(--color-txt-on-dark);
    }

    button[type=reset] {
      background: var(--color-bg);
      color: var(--color-primary-dk);
    }

    a {
      color: var(--color-primary-sk);
    }

    a:hover {
      color: var(--color-primary-dk);
    }

    input::placeholder {
      color: var(--color-txt-fg);
    }

    fieldset {
      background: light-dark(var(--color-bg), var(--color-accent-bg));
      border: 1px solid var(--color-border);
    }

    input {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      color: var(--color-txt);
    }

    select {
      background: light-dark(var(--color-accent-bg), var(--color-bg));
      border: 1px solid var(--color-border);
      color: var(--color-primary-sk);
    }

    option {
      background: var(--color-bg);
    }

    nav>ol>li[aria-selected="true"] {
      background: var(--color-primary-bg);
      border-left: 3px solid var(--color-primary-dk);
    }

    .card {
      background: var(--color-secondary-bg);
    }

    .card:hover {
      background: var(--color-secondary-fg);
    }

    /** OTHER STYLES **/

    * {
      box-sizing: border-box;
      border-spacing: 0;
      margin: 0;
    }

    main {
      margin-inline: 40px;
    }

    p {
      padding: 0;
      margin: 0px;
      margin-block: 10px;
    }

    blockquote {
      padding: 6px;
    }

    mark {
      padding: 4px;
      border-radius: 6px;
    }

    pre>code {
      display: block;
      text-align: left;
      padding: 6px;
    }

    button {
      padding-block: 10px;
      padding-inline: 20px;
      font-weight: bold;
    }

    input:not([type=color]),
    select:not(#theme-sel) {
      width: 100%;
      height: 40px;
    }

    nav>ol {
      list-style-type: none;
    }

    nav>ol>li[aria-selected="true"] {
      padding-block: 8px;
    }

    nav>ol>li>a {
      text-decoration: none;
    }

    .card {
      padding: 8px;
    }
  </style>

  <link rel="stylesheet" id="theme-default" href="css/default.css">
  <link rel="stylesheet" id="theme-writing" href="css/writing.css">
  <link rel="stylesheet" id="theme-scholar" href="css/scholar.css">
  <link rel="stylesheet" id="theme-sunset" href="css/sunset.css">
  <link rel="stylesheet" id="theme-bold" href="css/bold.css">
  <link rel="stylesheet" id="theme-pink" href="css/pink.css">
  <link rel="stylesheet" id="theme-green" href="css/green.css">
  <link rel="stylesheet" id="theme-betty" href="css/betty.css">
</head>

<body>
  <main>
    <p>
    <form>
      <label>
        <span>Theme</span>
        <select id="theme-sel" onchange="onThemeChange(this)">
          <option value="default">Default (light / dark)</option>
          <option value="writing">Writing (light / dark)</option>
          <option value="scholar">Scholar (light / dark)</option>
          <option value="sunset">Sunset (light)</option>
          <option value="pink">Pink (light)</option>
          <option value="bold">Bold (light)</option>
          <option value="green">Green (dark)</option>
          <option value="betty">Betty (dark)</option>
        </select>
      </label>
    </form>
    </p>
    <hr/>
    <p>
      This is some <a href="">test</a>.
    </p>
    <p>
      <mark>Update</mark>
    </p>
    <blockquote>
      <p>
        This is good
      </p>
      <p>
        <mark>Update</mark>
      </p>
    </blockquote>

    <pre>
      <code>
function abc() { 
  console.log('abc');
}
      </code>
    </pre>

    <details class="card">
      <summary>Title</summary>
      <p>
        Lorem ipsum
      </p>
    </details>

    <br />
    <br />

    <form>
      <fieldset>
        <legend>Form</legend>

        <p>
          <label>Email</label>
          <input type="email" placeholder="Email" />
        </p>
        <p>
          <label>Option</label>
          <select>
            <option>Full</option>
            <option>Fast</option>
          </select>
        </p>
        <br />
        <p>
          <button>Test</button>
          <button type="reset">Reset</button>
        </p>
      </fieldset>
    </form>

    <br />
    <br />
    <nav>
      <ol>
        <li aria-selected="true">
          <a href="">Test 1</a>
        </li>
        <li>
          <a href="">Test 1</a>
        </li>
      </ol>
    </nav>
  </main>
</body>

<script type="text/javascript">
  (() => {
    onThemeChange({ value: 'default' });
  })();

  function onThemeChange(t) {
    const theme = t.value;
    document.querySelectorAll('link[rel="stylesheet"]').forEach(link => {
      link.disabled = true;
    });
    document.getElementById('theme-' + theme).disabled = false;
    delete document.documentElement.dataset.theme;

    switch (theme) {
      case 'default': 
      case 'writing': 
      case 'scholar': {
        break;
      }
      case 'pink': 
      case 'sunset': {
        document.documentElement.dataset.theme = 'light';
        break;
      }
      case 'bold': 
      case 'green': 
      case 'betty': {
        document.documentElement.dataset.theme = 'dark';
        break;
      }
    }
  }

  function onColorChange(t, col, over) {
    const color = t.value;
    if (over === true) {
      document.getElementById('color-' + col).value = color;
    }
  }
</script>

</html>
