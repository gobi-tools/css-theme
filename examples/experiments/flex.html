<!DOCTYPE html>
<html lang="en-us">

<!--
pairings:
- [BOTH] bg: #ffffff, txt: #212121|#ffffff, primary: #526cfe, secondary: #8b5cf6
- [LIGT] bg: #f8f9eb, txt: #212121|#ffffff, primary: #ffa200, secondary: #D47DBD
- [DARK] bg: #1d2f21, txt: #ffffff|#ffffff, primary: #ffe229, secondary: #f75f5f 
- [DARK] bg: #FFE3F3, txt: #1F26FF|#ffffff. pri,ary: #526cfe, secomdaru: #ffffff
-->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Layouts</title>

  <style>
    :root {
      --color-bg: #ffffff;

      --color-txt: #212121;
      --color-txt-on-dark: #ffffff;

      --color-txt-bg: color-mix(in srgb, var(--color-txt) 14%, transparent);
      /* --color-txt-bg: color-mix(in oklch, var(--color-txt) 30%, white); */
      --color-txt-fg: color-mix(in oklch, var(--color-txt) 60%, white);

      --color-accent-bg: color-mix(in srgb, var(--color-txt) 8%, transparent);
      --color-accent-fg: color-mix(in srgb, var(--color-txt) 14%, transparent);
      --color-accent-dk: color-mix(in oklch, var(--color-txt) 75%, white);

      --color-primary: #526cfe;
      --color-primary-bg: color-mix(in oklch, var(--color-primary) 30%, white);
      --color-primary-dk: color-mix(in oklch, var(--color-primary) 65%, black);
      --color-primary-sk: color-mix(in oklch, var(--color-primary) 85%, black);
      --color-primary-tx: color-mix(in oklch, var(--color-primary) 0%, white);

      --color-secondary: #8b5cf6;
      --color-secondary-bg: color-mix(in oklch, var(--color-secondary) 30%, white);
      --color-secondary-fg: color-mix(in oklch, var(--color-secondary) 60%, white);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #111827;
        --color-txt: #d8eaff;
        
        /* --color-txt-bg: color-mix(in oklch, var(--color-txt) 40%, black); */
        --color-txt-fg: color-mix(in oklch, var(--color-txt) 60%, black);

        --color-accent-dk: color-mix(in oklch, var(--color-txt) 50%, black);

        --color-primary-bg: color-mix(in srgb, var(--color-primary) 8%, transparent);
        --color-primary-dk: color-mix(in oklch, var(--color-primary) 25%, white);
        --color-primary-sk: color-mix(in oklch, var(--color-primary) 35%, white);
        --color-primary-tx: color-mix(in oklch, var(--color-primary) 0%, white);

        --color-secondary-bg: color-mix(in oklch, var(--color-secondary) 90%, black);
        --color-secondary-fg: color-mix(in oklch, var(--color-secondary) 70%, white);
      }
    }

    /** COLORS **/

    * {
      color: var(--color-txt);
    }

    body {
      background: var(--color-bg);
    }

    blockquote {
      background: var(--color-accent-bg);
      border-left: 5px solid var(--color-accent-dk);
    }

    mark {
      background: var(--color-accent-fg);
    }

    pre>code {
      background: var(--color-accent-bg);
      border-left: 5px solid var(--color-secondary);
    }

    button {
      border: 2px solid var(--color-primary);
      background: var(--color-primary);
      color: var(--color-txt-on-dark);
    }

    button[type=reset] {
      background: var(--color-bg);
      color: var(--color-primary-dk);
    }

    a {
      color: var(--color-primary-sk);
    }

    a:hover {
      color: var(--color-primary-dk);
    }

    input::placeholder {
      color: var(--color-txt-fg);
    }

    fieldset,
    input {
      background: var(--color-bg);
      border: 1px solid var(--color-txt-bg);
      color: var(--color-txt);
    }

    select {
      background: var(--color-accent-bg);
      border: 1px solid var(--color-txt-bg);
      color: var(--color-primary-sk);
    }

    nav>ol>li[aria-selected="true"] {
      background: var(--color-primary-bg);
      border-left: 3px solid var(--color-primary-dk);
    }

    .card {
      background: var(--color-secondary-bg);
    }

    .card:hover {
      background: var(--color-secondary-fg);
    }

    /** OTHER STYLES **/

    * {
      box-sizing: border-box;
      border-spacing: 0;
      margin: 0;
    }

    main {
      margin-inline: 40px;
    }

    p {
      padding: 0;
      margin: 0px;
      margin-block: 10px;
    }

    blockquote {
      padding: 6px;
    }

    mark {
      padding: 4px;
      border-radius: 6px;
    }

    pre>code {
      display: block;
      text-align: left;
      padding: 6px;
    }

    button {
      padding-block: 10px;
      padding-inline: 20px;
      font-weight: bold;
    }

    input:not([type=color]),
    select:not(#theme-sel) {
      width: 100%;
      height: 40px;
    }

    nav>ol {
      list-style-type: none;
    }

    nav>ol>li[aria-selected="true"] {
      padding-block: 8px;
    }

    nav>ol>li>a {
      text-decoration: none;
    }

    .card {
      padding: 8px;
    }
  </style>
</head>

<body>
  <main>
    <p>
    <form>
      <label>
        <span>Theme</span>
        <select id="theme-sel" onchange="onThemeChange(this)">
          <option value="default">Default</option>
          <option value="sunset">Sunset</option>
          <option value="green">Green</option>
          <option value="pink">Pink</option>
          <option value="bold">Bold</option>
        </select>
      </label>
      <label>
        <span>Bg</span>
        <input id="color-sel" type="color" value="#ffffff" onchange="onColorChange(this, 'bg')" />
      </label>
      <label>
        <span>Txt</span>
        <input id="color-sel" type="color" value="#212121" onchange="onColorChange(this, 'txt')" />
      </label>
      <label>
        <span>Txt (Dark)</span>
        <input id="color-sel" type="color" value="#ffffff" onchange="onColorChange(this, 'txt-on-dark')" />
      </label>
      <label>
        <span>Primary</span>
        <input id="color-sel" type="color" value="#526cfe" onchange="onColorChange(this, 'primary')" />
      </label>
      <label>
        <span>Secondary</span>
        <input id="color-sel" type="color" value="#8b5cf6" onchange="onColorChange(this, 'secondary')" />
      </label>
    </form>
    </p>
    <p>
      This is some <a href="">test</a>.
    </p>
    <p>
      <mark>Update</mark>
    </p>
    <blockquote>
      <p>
        This is good
      </p>
      <p>
        <mark>Update</mark>
      </p>
    </blockquote>

    <pre>
      <code>
function abc() { 
  console.log('abc');
}
      </code>
    </pre>

    <details class="card">
      <summary>Title</summary>
      <p>
        Lorem ipsum
      </p>
    </details>

    <br />
    <br />

    <form>
      <fieldset>
        <legend>Form</legend>

        <p>
          <label>Email</label>
          <input type="email" placeholder="Email" />
        </p>
        <p>
          <label>Option</label>
          <select>
            <option>Full</option>
            <option>Fast</option>
          </select>
        </p>
        <br />
        <p>
          <button>Test</button>
          <button type="reset">Reset</button>
        </p>
      </fieldset>
    </form>

    <br />
    <br />
    <nav>
      <ol>
        <li aria-selected="true">
          <a href="">Test 1</a>
        </li>
        <li>
          <a href="">Test 1</a>
        </li>
      </ol>
    </nav>
  </main>
</body>

<script type="text/javascript">
  function onThemeChange(t) {
    const theme = t.value;
    switch (theme) {
      case 'default': {
        onColorChange({ value: '#ffffff' }, 'bg');
        onColorChange({ value: '#212121' }, 'txt');
        onColorChange({ value: '#ffffff' }, 'txt-on-dark');
        onColorChange({ value: '#526cfe' }, 'primary');
        onColorChange({ value: '#8b5cf6' }, 'secondary');
        break;
      }
      case 'sunset': {
        onColorChange({ value: '#f8f9eb' }, 'bg');
        onColorChange({ value: '#212121' }, 'txt');
        onColorChange({ value: '#ffffff' }, 'txt-on-dark');
        onColorChange({ value: '#ffa200' }, 'primary');
        onColorChange({ value: '#D47DBD' }, 'secondary');
        break;
      }
      case 'green': {
        onColorChange({ value: '#1d2f21' }, 'bg');
        onColorChange({ value: '#ffffff' }, 'txt');
        onColorChange({ value: '#ffffff' }, 'txt-on-dark');
        onColorChange({ value: '#ffe229' }, 'primary');
        onColorChange({ value: '#f75f5f' }, 'secondary');
        break;
      }
      case 'pink': {
        onColorChange({ value: '#FFE3F3' }, 'bg');
        onColorChange({ value: '#1F26FF' }, 'txt');
        onColorChange({ value: '#ffffff' }, 'txt-on-dark');
        onColorChange({ value: '#526cfe' }, 'primary');
        onColorChange({ value: '#ffffff' }, 'secondary');
        break;
      }
      case 'bold': {
        onColorChange({ value: '#fff8dc' }, 'bg');
        onColorChange({ value: '#111827' }, 'txt');
        onColorChange({ value: '#f9fafb' }, 'txt-on-dark');
        onColorChange({ value: '#111111' }, 'primary');
        onColorChange({ value: '#808080' }, 'secondary');
        break;
      }
    }
  }

  function onColorChange(t, col) {
    const color = t.value;
    document.documentElement.style.setProperty('--color-' + col, color)
    console.log(color);
  }
</script>

</html>
