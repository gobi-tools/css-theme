<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Layouts</title>
  <!--
   bg -> faint
   fg -> muted
   dk -> ???
   sk -> inked 
   -->

  <style>
    :root,
    :root[data-theme='light'],
    .success,
    .error {
      --color-border: color-mix(in srgb, var(--color-txt) 14%, transparent);
      --color-txt-fg: color-mix(in srgb, var(--color-txt) 50%, transparent);

      --color-accent-bg: color-mix(in srgb, var(--color-txt) 8%, transparent);
      --color-accent-fg: color-mix(in srgb, var(--color-txt) 14%, transparent);
      --color-accent-dk: color-mix(in oklch, var(--color-txt) 75%, white);

      --color-primary-bg: color-mix(in srgb, var(--color-primary) 8%, transparent);
      --color-primary-sk: color-mix(in oklch, var(--color-primary) 85%, black);

      --color-secondary-bg: color-mix(in oklch, var(--color-secondary) 30%, white);
    }

    :root[data-theme='dark'] {
      --color-accent-dk: color-mix(in oklch, var(--color-txt) 50%, black);

      --color-primary-sk: color-mix(in oklch, var(--color-primary) 35%, white);

      --color-secondary-bg: color-mix(in oklch, var(--color-secondary) 90%, black);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-accent-dk: color-mix(in oklch, var(--color-txt) 50%, black);

        --color-primary-sk: color-mix(in oklch, var(--color-primary) 35%, white);

        --color-secondary-bg: color-mix(in oklch, var(--color-secondary) 90%, black);
      }
    }

    /** COLORS **/

    * {
      color: var(--color-txt);
    }

    body {
      background: var(--color-bg);
    }

    blockquote {
      background: var(--color-accent-bg);
      border-left: 5px solid var(--color-accent-dk);
    }

    mark {
      background: var(--color-accent-fg);
    }

    pre>code {
      background: var(--color-accent-bg);
      border-left: 5px solid var(--color-secondary);
    }

    button {
      border: 2px solid var(--color-primary);
      background: var(--color-primary);
      color: var(--color-txt-on-dark);
    }

    button[type=reset] {
      background: var(--color-bg);
      color: var(--color-txt);
    }

    a {
      color: var(--color-primary-sk);
    }

    input::placeholder {
      color: var(--color-txt-fg);
    }

    fieldset {
      background: light-dark(var(--color-bg), var(--color-accent-bg));
      border: 1px solid var(--color-border);
    }

    input {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      color: var(--color-txt);
    }

    select {
      background: light-dark(var(--color-accent-bg), var(--color-bg));
      border: 1px solid var(--color-border);
      color: var(--color-primary-sk);
    }

    option {
      background: var(--color-bg);
    }

    nav>ol>li[aria-selected="true"] {
      background: var(--color-primary-bg);
      border-left: 3px solid var(--color-primary-sk);
    }

    .card {
      background: var(--color-secondary-bg);
    }

    /** COLORS - SEMANTIC **/

    .success {
      --color-primary: var(--color-success);
      --color-secondary: var(--color-success);
      --color-accent-bg: color-mix(in srgb, var(--color-success) 20%, transparent);
      --color-accent-fg: color-mix(in srgb, var(--color-success) 35%, transparent);
      --color-accent-dk: color-mix(in oklch, var(--color-success) 90%, white);
    }

    :root[data-theme='dark'] {
      .success {
        --color-accent-bg: color-mix(in srgb, var(--color-success) 45%, transparent);
        --color-accent-fg: color-mix(in srgb, var(--color-success) 55%, transparent);
        --color-primary-sk: color-mix(in oklch, var(--color-success) 50%, white);
        --color-secondary-bg: color-mix(in oklch, var(--color-success) 70%, black);
      }
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        .success {
          --color-accent-bg: color-mix(in srgb, var(--color-success) 45%, transparent);
          --color-accent-fg: color-mix(in srgb, var(--color-success) 55%, transparent);
          --color-primary-sk: color-mix(in oklch, var(--color-success) 50%, white);
          --color-secondary-bg: color-mix(in oklch, var(--color-success) 70%, black);
        }
      }
    }

    .error {
      --color-primary: var(--color-error);
      --color-secondary: var(--color-error);
      --color-accent-bg: color-mix(in srgb, var(--color-error) 20%, transparent);
      --color-accent-fg: color-mix(in srgb, var(--color-error) 35%, transparent);
      --color-accent-dk: color-mix(in oklch, var(--color-error) 90%, white);
    }

    :root[data-theme='dark'] {
      .error {
        --color-accent-bg: color-mix(in srgb, var(--color-error) 45%, transparent);
        --color-accent-fg: color-mix(in srgb, var(--color-error) 55%, transparent);
        --color-primary-sk: color-mix(in oklch, var(--color-error) 50%, white);
        --color-secondary-bg: color-mix(in oklch, var(--color-error) 70%, black);
      }
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        .error {
          --color-accent-bg: color-mix(in srgb, var(--color-error) 45%, transparent);
          --color-accent-fg: color-mix(in srgb, var(--color-error) 55%, transparent);
          --color-primary-sk: color-mix(in oklch, var(--color-error) 50%, white);
          --color-secondary-bg: color-mix(in oklch, var(--color-error) 70%, black);
        }
      }
    }

    /** OTHER STYLES **/

    * {
      box-sizing: border-box;
      border-spacing: 0;
      margin: 0;
    }

    main {
      margin-inline: 40px;
    }

    p {
      padding: 0;
      margin: 0px;
      margin-block: 10px;
    }

    blockquote {
      padding: 6px;
    }

    mark {
      padding: 4px;
      border-radius: 6px;
    }

    pre>code {
      display: block;
      text-align: left;
      padding: 6px;
    }

    button {
      padding-block: 10px;
      padding-inline: 20px;
      font-weight: bold;
    }

    input:not([type=color]),
    select:not(#theme-sel):not(#mode-sel) {
      width: 100%;
      height: 40px;
    }

    nav>ol {
      list-style-type: none;
    }

    nav>ol>li[aria-selected="true"] {
      padding-block: 8px;
    }

    nav>ol>li>a {
      text-decoration: none;
    }

    .card {
      padding: 8px;
    }

    button:hover {
      filter: brightness(90%);
    }

    .card:hover {
      filter: brightness(90%);
    }

    a:hover {
      filter: brightness(50%);
    }

    :root[data-theme='light'] {
      button:hover {
        filter: brightness(90%);
      }

      .card:hover {
        filter: brightness(90%);
      }

      a:hover {
        filter: brightness(50%);
      }
    }

    :root[data-theme='dark'] {

      a:hover,
      button:hover,
      .card:hover {
        filter: brightness(110%);
      }
    }

    @media (prefers-color-scheme: dark) {

      a:hover,
      button:hover,
      .card:hover {
        filter: brightness(110%);
      }
    }
  </style>

  <link rel="stylesheet" id="theme-default" href="css/default.css">
  <link rel="stylesheet" id="theme-writing" href="css/writing.css">
  <link rel="stylesheet" id="theme-scholar" href="css/scholar.css">
  <link rel="stylesheet" id="theme-sunset" href="css/sunset.css">
  <link rel="stylesheet" id="theme-bold" href="css/bold.css">
  <link rel="stylesheet" id="theme-pink" href="css/pink.css">
  <link rel="stylesheet" id="theme-green" href="css/green.css">
  <link rel="stylesheet" id="theme-betty" href="css/betty.css">
</head>

<body>
  <main>
    <p>
    <form>
      <label>
        <span>Theme</span>
        <select id="theme-sel" onchange="onThemeChange(this)">
          <option value="default">Default (light / dark)</option>
          <option value="writing">Writing (light / dark)</option>
          <option value="scholar">Scholar (light / dark)</option>
          <option value="sunset">Sunset (light)</option>
          <option value="pink">Pink (light)</option>
          <option value="bold">Bold (light)</option>
          <option value="green">Green (dark)</option>
          <option value="betty">Betty (dark)</option>
        </select>
      </label>

      <label>
        <span>Mode</span>
        <select id="mode-sel" onchange="onModeChange(this)">
          <option value="normal">Normal</option>
          <option value="error">Error</option>
          <option value="success">Success</option>
        </select>
      </label>
    </form>
    </p>
    <hr />
    <p>
      This is some <a id="example-link" href="">test</a>.
    </p>
    <p>
      <mark>Update</mark>
    </p>
    <blockquote id="example-blockquote">
      <p>
        This is good
      </p>
      <p>
        <mark>Update</mark>
      </p>
    </blockquote>

    <pre>
      <code>
function abc() { 
  console.log('abc');
}
      </code>
    </pre>

    <details id="example-details" class="card">
      <summary>Title</summary>
      <p>
        Lorem ipsum
      </p>
    </details>

    <br />
    <br />

    <form>
      <fieldset>
        <legend>Form</legend>

        <p>
          <label>Email</label>
          <input type="email" placeholder="Email" />
        </p>
        <p>
          <label>Option</label>
          <select id="example-select">
            <option>Full</option>
            <option>Fast</option>
          </select>
        </p>
        <br />
        <p>
          <button>Click</button>
          <button id="example-button-normal">Test</button>
          <button id="example-button-reset" type="reset">Reset</button>
        </p>
      </fieldset>
    </form>

    <br />
    <br />
    <nav>
      <ol>
        <li id="example-tab" aria-selected="true">
          <a href="">Test 1</a>
        </li>
        <li>
          <a href="">Test 1</a>
        </li>
      </ol>
    </nav>
  </main>
</body>

<script type="text/javascript">
  (() => {
    onThemeChange({ value: 'default' });
  })();

  function onThemeChange(t) {
    const theme = t.value;
    document.querySelectorAll('link[rel="stylesheet"]').forEach(link => {
      link.disabled = true;
    });
    document.getElementById('theme-' + theme).disabled = false;
    delete document.documentElement.dataset.theme;

    switch (theme) {
      case 'default':
      case 'writing':
      case 'scholar': {
        break;
      }
      case 'pink':
      case 'sunset':
      case 'bold': {
        document.documentElement.dataset.theme = 'light';
        break;
      }
      case 'green':
      case 'betty': {
        document.documentElement.dataset.theme = 'dark';
        break;
      }
    }
  }

  function onModeChange(t) {
    const mode = t.value;
    addClass('example-link', mode);
    addClass('example-blockquote', mode);
    addClass('example-details', mode);
    addClass('example-select', mode);
    addClass('example-button-normal', mode);
    addClass('example-button-reset', mode);
    addClass('example-tab', mode);
  }

  function addClass(id, cls) {
    const element = document.getElementById(id);
    const classList = element.classList;
    classList.remove('success');
    classList.remove('error');

    if (cls === 'success' || cls === 'error') {
      classList.add(cls);
    }
    element.classList = classList;
  }
</script>

</html>
