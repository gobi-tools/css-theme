<!DOCTYPE html>
<html lang="en-us">

<!--
pairings:
- bg: #f8f9eb, txt: #212121, accent: #bdd47d, primary: #ffa200, secondary: #D47DBD
- bg: #ffffff, txt: #212121, accent: #00bfa5, primary: #526cfe, secondary: #8b5cf6
-->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Layouts</title>

  <style>
    :root {
      --color-bg: #ffffff;

      --color-txt: #212121;
      --color-txt-bg: color-mix(in oklch, var(--color-txt) 30%, white);
      --color-txt-fg: color-mix(in oklch, var(--color-txt) 60%, white);

      --color-accent: #00bfa5;
      --color-accent-bg: color-mix(in oklch, var(--color-accent) 30%, white);
      --color-accent-fg: color-mix(in oklch, var(--color-accent) 60%, white);
      --color-accent-dk: color-mix(in oklch, var(--color-accent) 65%, black);

      --color-primary: #526cfe;
      --color-primary-bg: color-mix(in oklch, var(--color-primary) 30%, white);
      --color-primary-dk: color-mix(in oklch, var(--color-primary) 65%, black);
      --color-primary-sk: color-mix(in oklch, var(--color-primary) 85%, black);

      --color-secondary: #8b5cf6;
      --color-secondary-bg: color-mix(in oklch, var(--color-secondary) 30%, white);
      --color-secondary-fg: color-mix(in oklch, var(--color-secondary) 60%, white);
    }

    @media (prefers-color-scheme: dark) {}

    /** COLORS **/

    * {
      color: var(--color-txt);
    }

    body {
      background: var(--color-bg);
    }

    blockquote {
      background: var(--color-accent-bg);
      border-left: 5px solid var(--color-accent-dk);
    }

    mark {
      background: var(--color-accent-fg);
    }

    pre>code {
      background: var(--color-accent-bg);
      border-left: 5px solid var(--color-secondary);
    }

    button {
      border: 2px solid var(--color-primary);
      background: var(--color-primary);
      color: var(--color-primary-bg);
    }

    button[type=reset] {
      background: var(--color-bg);
      color: var(--color-primary-dk);
    }

    a {
      color: var(--color-primary-sk);
    }

    a:hover {
      color: var(--color-primary-dk);
    }

    input::placeholder {
      color: var(--color-txt-fg);
    }

    fieldset,
    input,
    select {
      background: var(--color-bg);
      border: 1px solid var(--color-txt-bg);
      color: var(--color-txt);
    }

    select {
      color: var(--color-primary);
    }

    nav>ol>li[aria-selected="true"] {
      background: var(--color-primary-bg);
      border-left: 3px solid var(--color-primary-dk);
    }

    .card {
      background: var(--color-secondary-bg);
    }

    .card:hover {
      background: var(--color-secondary-fg);
    }

    /** OTHER STYLES **/

    * {
      box-sizing: border-box;
      border-spacing: 0;
      margin: 0;
    }

    main {
      margin-inline: 40px;
    }

    p {
      padding: 0;
      margin: 0px;
      margin-block: 10px;
    }

    blockquote {
      padding: 6px;
    }

    mark {
      padding: 4px;
      border-radius: 6px;
    }

    pre>code {
      display: block;
      text-align: left;
      padding: 6px;
    }

    button {
      padding-block: 10px;
      padding-inline: 20px;
      font-weight: bold;
    }

    input:not([type=color]),
    select {
      width: 100%;
      height: 40px;
    }

    nav>ol {
      list-style-type: none;
    }

    nav>ol>li[aria-selected="true"] {
      padding-block: 8px;
    }

    nav>ol>li>a {
      text-decoration: none;
    }

    .card {
      padding: 8px;
    }
  </style>
</head>

<body>
  <main>
    <p>
    <form>
      <input id="color-sel" type="color" value="#ffffff" onchange="onColorChange(this, 'bg')" />
      <input id="color-sel" type="color" value="#212121" onchange="onColorChange(this, 'txt')" />
      <input id="color-sel" type="color" value="#00bfa5" onchange="onColorChange(this, 'accent')" />
      <input id="color-sel" type="color" value="#526cfe" onchange="onColorChange(this, 'primary')" />
      <input id="color-sel" type="color" value="#8b5cf6" onchange="onColorChange(this, 'secondary')" />
    </form>
    </p>
    <p>
      This is some <a href="">test</a>.
    </p>
    <p>
      <mark>Update</mark>
    </p>
    <blockquote>
      <p>
        This is good
      </p>
      <p>
        <mark>Update</mark>
      </p>
    </blockquote>

    <pre>
      <code>
function abc() { 
  console.log('abc');
}
      </code>
    </pre>

    <details class="card">
      <summary>Title</summary>
      <p>
        Lorem ipsum
      </p>
    </details>

    <br />
    <br />

    <form>
      <fieldset>
        <legend>Form</legend>

        <p>
          <label>Email</label>
          <input type="email" placeholder="Email" />
        </p>
        <p>
          <label>Option</label>
          <select>
            <option>Full</option>
            <option>Fast</option>
          </select>
        </p>
        <br />
        <p>
          <button>Test</button>
          <button type="reset">Reset</button>
        </p>
      </fieldset>
    </form>

    <br />
    <br />
    <nav>
      <ol>
        <li aria-selected="true">
          <a href="">Test 1</a>
        </li>
        <li>
          <a href="">Test 1</a>
        </li>
      </ol>
    </nav>
  </main>
</body>

<script type="text/javascript">
  function onColorChange(t, col) {
    const color = t.value;
    document.documentElement.style.setProperty('--color-' + col, color)
    console.log(color);
  }
</script>

</html>
