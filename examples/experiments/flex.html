<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Layouts</title>
  <style>
    :root,
    .success,
    .error 
    {
      --color-bg: light-dark(#ffffff, #111827);
      --color-txt: light-dark(#212121, #d8eaff);
      --color-txt-on-dark: #ffffff;
      --color-primary: #526cfe;
      --color-secondary: #8b5cf6;

      --color-success: #23b157;
      --color-error: #ef4444;

      --color-bg-hover: color-mix(in oklab, var(--color-bg) 90%, light-dark(black, white));

      --color-border: color-mix(in srgb, var(--color-txt) 14%, transparent);

      --color-accent-faint: color-mix(in srgb, var(--color-txt) 8%, transparent);
      --color-accent-muted: color-mix(in srgb, var(--color-txt) 14%, transparent);
      --color-accent-inked: light-dark(color-mix(in oklch, var(--color-txt) 75%, white),
          color-mix(in oklch, var(--color-txt) 50%, black));

      --color-primary-hover: color-mix(in oklab, var(--color-primary) 90%, light-dark(black, white));
      --color-primary-faint: color-mix(in srgb, var(--color-primary) 8%, transparent);
      --color-primary-inked: light-dark(color-mix(in oklch, var(--color-primary) 85%, black),
          color-mix(in oklch, var(--color-primary) 35%, white));
      --color-primary-inked-hover: color-mix(in oklch, var(--color-primary-inked) 70%, light-dark(black, white));

      --color-secondary-muted: light-dark(color-mix(in oklch, var(--color-secondary) 30%, white),
          color-mix(in oklch, var(--color-secondary) 90%, black));
      --color-secondary-muted-hover: color-mix(in oklab, var(--color-secondary-muted) 90%, light-dark(black, white));
    }

    /** COLORS **/

    * {
      color: var(--color-txt);
    }

    body {
      background: var(--color-bg);
    }

    blockquote {
      background: var(--color-accent-faint);
      border-left: 5px solid var(--color-accent-inked);
    }

    mark {
      background: var(--color-accent-muted);
    }

    pre>code {
      background: var(--color-accent-faint);
      border-left: 5px solid var(--color-secondary);
    }

    button {
      border: 2px solid var(--color-primary);
      background: var(--color-primary);
      color: var(--color-txt-on-dark);
    }

    button:hover {
      background: var(--color-primary-hover);
    }

    button[type=reset] {
      background: var(--color-bg);
      color: var(--color-txt);
    }

    button[type=reset]:hover {
      background: var(--color-bg-hover);
    }

    a {
      color: var(--color-primary-inked);
    }

    a:hover {
      color: var(--color-primary-inked-hover);
    }

    input::placeholder {
      filter: opacity(70%);
    }

    fieldset {
      background: light-dark(var(--color-bg), var(--color-accent-faint));
      border: 1px solid var(--color-border);
    }

    input {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      color: var(--color-txt);
    }

    select {
      background: light-dark(var(--color-accent-faint), var(--color-bg));
      border: 1px solid var(--color-border);
      color: var(--color-primary-inked);
    }

    option {
      background: var(--color-bg);
    }

    nav>ol>li[aria-selected="true"] {
      background: var(--color-primary-faint);
      border-left: 3px solid var(--color-primary-inked);
    }

    th,
    td {
      border-bottom: 1px solid var(--color-accent-inked);
    }

    tr:hover {
      background-color: var(--color-accent-faint);
    }

    .card {
      background: var(--color-secondary-muted);
      border: 2px solid var(--color-border);
    }

    .card:hover {
      background: var(--color-secondary-muted-hover);
    }

    /** COLORS - SEMANTIC **/

    .success {
      /* --color-bg: var(--color-bg); */
      /* --color-bg-hover: var(--color-bg-hover); */
      --color-primary: var(--color-success);
      --color-secondary: var(--color-success);

      --color-border: color-mix(in srgb, var(--color-success) 40%, transparent);

      --color-accent-faint: light-dark(color-mix(in srgb, var(--color-success) 20%, transparent),
          color-mix(in srgb, var(--color-success) 45%, transparent));
      --color-accent-muted: light-dark(color-mix(in srgb, var(--color-success) 35%, transparent),
          color-mix(in srgb, var(--color-success) 55%, transparent));
      --color-accent-inked: light-dark(color-mix(in oklch, var(--color-success) 90%, white),
          color-mix(in oklch, var(--color-success) 90%, white));

      --color-primary-inked: light-dark(color-mix(in oklch, var(--color-success) 85%, black),
          color-mix(in oklch, var(--color-success) 50%, white));

      --color-secondary-muted: light-dark(color-mix(in oklch, var(--color-success) 30%, white),
          color-mix(in oklch, var(--color-success) 70%, black));
    }

    .error {
      /* --color-bg: var(--color-bg); */
      /* --color-bg-hover: var(--color-bg-hover); */
      --color-primary: var(--color-error);
      --color-secondary: var(--color-error);

      --color-border: color-mix(in srgb, var(--color-error) 40%, transparent);

      --color-accent-faint: light-dark(color-mix(in srgb, var(--color-error) 20%, transparent),
          color-mix(in srgb, var(--color-error) 45%, transparent));
      --color-accent-muted: light-dark(color-mix(in srgb, var(--color-error) 35%, transparent),
          color-mix(in srgb, var(--color-error) 55%, transparent));
      --color-accent-inked: light-dark(color-mix(in oklch, var(--color-error) 90%, white),
          color-mix(in oklch, var(--color-error) 90%, white));

      --color-primary-inked: light-dark(color-mix(in oklch, var(--color-error) 85%, black),
          color-mix(in oklch, var(--color-error) 50%, white));

      --color-secondary-muted: light-dark(color-mix(in oklch, var(--color-error) 30%, white),
          color-mix(in oklch, var(--color-error) 70%, black));
    }

    /** OTHER STYLES **/

    * {
      box-sizing: border-box;
      border-spacing: 0;
      margin: 0;
    }

    main {
      margin-inline: 40px;
    }

    p {
      padding: 0;
      margin: 0px;
      margin-block: 10px;
    }

    blockquote {
      padding: 6px;
    }

    mark {
      padding: 4px;
      border-radius: 6px;
    }

    pre>code {
      display: block;
      text-align: left;
      padding: 6px;
    }

    button {
      padding-block: 10px;
      padding-inline: 20px;
      font-weight: bold;
    }

    input:not([type=color]),
    select:not(#theme-sel):not(#mode-sel) {
      width: 100%;
      height: 40px;
    }

    nav>ol {
      list-style-type: none;
    }

    nav>ol>li[aria-selected="true"] {
      padding-block: 8px;
    }

    nav>ol>li>a {
      text-decoration: none;
    }

    table {
      width: 100%;
      border: none;
    }

    .card {
      padding: 8px;
    }
  </style>

  <link rel="stylesheet" id="theme-default" href="css/default.css">
  <link rel="stylesheet" id="theme-writing" href="css/writing.css">
  <link rel="stylesheet" id="theme-scholar" href="css/scholar.css">
  <link rel="stylesheet" id="theme-sunset" href="css/sunset.css">
  <link rel="stylesheet" id="theme-bold" href="css/bold.css">
  <link rel="stylesheet" id="theme-pink" href="css/pink.css">
  <link rel="stylesheet" id="theme-green" href="css/green.css">
  <link rel="stylesheet" id="theme-betty" href="css/betty.css">
</head>

<body>
  <main>
    <p>
    <form>
      <label>
        <span>Theme</span>
        <select id="theme-sel" onchange="onThemeChange(this)">
          <option value="default">Default (light / dark)</option>
          <option value="writing">Writing (light / dark)</option>
          <option value="scholar">Scholar (light / dark)</option>
          <option value="sunset">Sunset (light)</option>
          <option value="pink">Pink (light)</option>
          <option value="bold">Bold (light)</option>
          <option value="green">Green (dark)</option>
          <option value="betty">Betty (dark)</option>
        </select>
      </label>

      <label>
        <span>Mode</span>
        <select id="mode-sel" onchange="onModeChange(this)">
          <option value="normal">Normal</option>
          <option value="error">Error</option>
          <option value="success">Success</option>
        </select>
      </label>
    </form>
    </p>
    <hr />
    <p>
      This is some <a id="example-link" href="">test</a>.
    </p>
    <p>
      <mark>Update</mark>
    </p>
    <blockquote id="example-blockquote">
      <p>
        This is good
      </p>
      <p>
        <mark>Update</mark>
      </p>
    </blockquote>

    <pre>
      <code>
function abc() { 
  console.log('abc');
}
      </code>
    </pre>

    <details id="example-details" class="card">
      <summary>Title</summary>
      <p>
        Lorem ipsum
      </p>
    </details>

    <table>
      <thead>
        <tr>
          <th>Col 1</th>
          <th>Col 2</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Row 1</td>
          <td>Row 2</td>
        </tr>
        <tr>
          <td>Row 1</td>
          <td>Row 2</td>
        </tr>
      </tbody>
    </table>

    <br />
    <br />

    <form>
      <fieldset>
        <legend>Form</legend>

        <p>
          <label>Email</label>
          <input type="email" placeholder="Email" />
        </p>
        <p>
          <label>Option</label>
          <select id="example-select">
            <option>Full</option>
            <option>Fast</option>
          </select>
        </p>
        <br />
        <p>
          <button>Click</button>
          <button id="example-button-normal">Test</button>
          <button id="example-button-reset" type="reset">Reset</button>
        </p>
      </fieldset>
    </form>

    <br />
    <br />
    <nav>
      <ol>
        <li id="example-tab" aria-selected="true">
          <a href="">Test 1</a>
        </li>
        <li>
          <a href="">Test 1</a>
        </li>
      </ol>
    </nav>
  </main>
</body>

<script type="text/javascript">
  (() => {
    onThemeChange({ value: 'default' });
  })();

  function onThemeChange(t) {
    const theme = t.value;
    document.querySelectorAll('link[rel="stylesheet"]').forEach(link => {
      link.disabled = true;
    });
    document.getElementById('theme-' + theme).disabled = false;
    delete document.documentElement.dataset.theme;
  }

  function onModeChange(t) {
    const mode = t.value;
    addClass('example-link', mode);
    addClass('example-blockquote', mode);
    addClass('example-details', mode);
    addClass('example-select', mode);
    addClass('example-button-normal', mode);
    addClass('example-button-reset', mode);
    addClass('example-tab', mode);
  }

  function addClass(id, cls) {
    const element = document.getElementById(id);
    const classList = element.classList;
    classList.remove('success');
    classList.remove('error');

    if (cls === 'success' || cls === 'error') {
      classList.add(cls);
    }
    element.classList = classList;
  }
</script>

</html>
