<!DOCTYPE html>
<html lang="en-us">

<!--
pairings:
- bg: #f8f9eb, accent: #bdd47d, primary: #ffa200, secondary: #D47DBD
- bg: #ffffff, accent: #00bfa5, primary: #526cfe, secondary: #8b5cf6
-->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Layouts</title>

  <style>
    :root {
      --color-bg: #ffffff;

      --color-accent: #00bfa5;
      --color-accent-bg: color-mix(in oklch, var(--color-accent) 30%, white);
      --color-accent-fg: color-mix(in oklch, var(--color-accent) 60%, white);
      --color-accent-dk: color-mix(in oklch, var(--color-accent) 65%, black);

      --color-primary: #526cfe;
      --color-primary-tx: color-mix(in oklch, var(--color-primary) 85%, black);
      --color-primary-dk: color-mix(in oklch, var(--color-primary) 65%, black);

      --color-secondary: #8b5cf6;
      --color-secondary-bg: color-mix(in oklch, var(--color-secondary) 30%, white);
    }

    * {
      box-sizing: border-box;
      border-spacing: 0;
      margin: 0;
    }

    main {
      margin-inline: 40px;
    }

    body {
      background: var(--color-bg);
    }

    p {
      padding: 0;
      margin: 0px;
      margin-block: 10px;
    }

    blockquote {
      padding: 6px;
      background: var(--color-accent-bg);
      border-left: 5px solid var(--color-accent-dk);
    }

    mark {
      padding: 4px;
      border-radius: 6px;
      background: var(--color-accent-fg);
    }

    pre>code {
      display: block;
      text-align: left;
      padding: 6px;
      background: var(--color-accent-bg);
      border-left: 5px solid var(--color-secondary);
    }
    
    button {
      border: 2px solid var(--color-primary);
      background: var(--color-primary);
      padding-block: 10px;
      padding-inline: 20px;
    }

    a {
      color: var(--color-primary-tx);
    }
    a:hover {
      color: var(--color-primary-fg);
    }

    button[type=reset] {
      background: var(--color-bg);
    }

    .card {
      padding: 8px;
      background: var(--color-secondary-bg);
    }
  </style>
</head>

<body>
  <main>
    <p>
    <form>
      <input id="color-sel" type="color" value="#ffffff" onchange="onColorChange(this, 'bg')" />
      <input id="color-sel" type="color" value="#00bfa5" onchange="onColorChange(this, 'accent')" />
      <input id="color-sel" type="color" value="#526cfe" onchange="onColorChange(this, 'primary')" />
      <input id="color-sel" type="color" value="#8b5cf6" onchange="onColorChange(this, 'secondary')" />
    </form>
    </p>
    <p>
      This is some <a href="">test</a>.
    </p>
    <p>
      <mark>Update</mark>
    </p>
    <blockquote>
      <p>
        This is good
      </p>
      <p>
        <mark>Update</mark>
      </p>
    </blockquote>

    <pre>
      <code>
function abc() { 
  console.log('abc');
}
      </code>
    </pre>

    <details class="card">
      <summary>Title</summary>
      <p>
        Lorem ipsum
      </p>
    </details>

    <p>
      <button>Test</button>
      <button type="reset">Reset</button>
    </p>
  </main>
</body>

<script type="text/javascript">
  function onColorChange(t, col) {
    const color = t.value;
    document.documentElement.style.setProperty('--color-' + col, color)
    console.log(color);
  }
</script>

</html>
